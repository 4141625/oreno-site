<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kohei's Page</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg, #1f1c2c, #928dab);
  color: #fff;
}

/* ヘッダー */
header {
  text-align: center;
  padding: 80px 20px;
}

header h1 {
  font-size: 3em;
  margin: 0;
}

header p {
  opacity: 0.8;
}

/* ナビ */
nav {
  display: flex;
  justify-content: center;
  background: rgba(0,0,0,0.5);
}

nav a {
  color: white;
  padding: 15px 25px;
  text-decoration: none;
}

nav a:hover {
  background: white;
  color: black;
}

/* メイン */
main {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 40px;
  gap: 20px;
}

/* カード */
.card {
  width: 280px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

/* ボタン */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #ff6a00;
  color: white;
  border-radius: 6px;
  text-decoration: none;
}

/* フッター */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>
  <h1>Kohei's Page</h1>
  <p>My private website</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Profile</a>
  <a href="#">Hobby</a>
  <a href="#">Contact</a>
</nav>

<main>

<div class="card">
  <h2>👤 Profile</h2>
  <p>名前：Kohei<br>大阪在住 / 営業 / Web勉強中</p>
</div>

<div class="card">
  <h2>🎮 Hobby</h2>
  <p>ゲーム / 音楽 / プログラミング</p>
</div>

<div class="card">
  <h2>📱 SNS</h2>
  <p>TwitterやInstagramなど後で追加</p>
  <a href="#" class="btn">見る</a>
</div>

<div class="card">
  <h2>📩 Contact</h2>
  <p>連絡用フォームやメールを設置予定</p>
</div>

</main>

<footer>
  © 2026 Kohei
</footer>

</body>
</html>
